# tmux configuration generated by tmux.info
# https://tmux.info/tools/config-generator

# Fix Vim ESC delay
set -sg escape-time 0

# Enable Mouse Support
set -g mouse on

# Increase History Limit
set -g history-limit 50000

# Start Index at 1
set -g base-index 1
setw -g pane-base-index 1

# True Color Support
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Change Prefix to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Better pane splitting (and keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================
# APPEARANCE
# ============================================

# Status bar position
set -g status-position top

# Status bar colors
set -g status-style 'bg=default fg=#8b949e'
set -g status-left-length 20
set -g status-right-length 20

set -g status-justify centre

# Status bar content
set -g status-left '#[fg=#00e68a,bold] #S #[fg=#30363d]│ '
set -g status-right '#[fg=#30363d]│#[fg=#8b949e] %H:%M '

# Window status
setw -g window-status-format ' #I-#W  ' 
setw -g window-status-current-format '#[fg=#00e68a,bold] #I-#W '

# Reload Binding
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
